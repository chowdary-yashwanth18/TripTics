{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-lg-8 col-md-10">
        <div class="glass-card p-5">
            <h2 class="text-center mb-2 gradient-text fw-bold">Plan Your Trip</h2>
            <p class="text-center text-muted mb-4">Enter your trip details and we'll find the best destinations for your budget.</p>

            {# Server-side validation error message #}
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                ⚠️ {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form action="{{ url_for('planner') }}" method="POST">

                <div class="row mb-4">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="starting_city" class="form-label fw-bold">Starting Location <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" class="form-control" id="starting_city" name="starting_city"
                               placeholder="e.g. Hyderabad">
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="state_select" class="form-label fw-bold">Select State <span class="text-muted fw-normal">(optional)</span></label>
                        <select class="form-select" id="state_select" name="state_select" onchange="updateDistricts()">
                            <option value="all">Anywhere / All States</option>
                            {% for state in states_list %}
                            <option value="{{ state }}">{{ state }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="target_state" class="form-label fw-bold">District / Destination <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" class="form-control" id="target_state" name="target_state" 
                               list="districtsList" placeholder="Select state first, or type directly">
                        <datalist id="districtsList">
                            <option value="all">Anywhere in the World</option>
                            {% for loc in locations %}
                            <option value="{{ loc }}"></option>
                            {% endfor %}
                        </datalist>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="budget" class="form-label fw-bold">Total Budget</label>
                        <div class="input-group">
                            <select class="form-select" id="budget_currency" name="budget_currency" style="max-width: 100px;">
                                <option value="INR">INR (₹)</option>
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="AED">AED (د.إ)</option>
                                <option value="SGD">SGD (S$)</option>
                                <option value="AUD">AUD (A$)</option>
                                <option value="CAD">CAD (C$)</option>
                            </select>
                            <input type="number" class="form-control" id="budget" name="budget"
                                   required min="10" step="10" placeholder="e.g. 15000">
                        </div>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="days" class="form-label fw-bold">Number of Days</label>
                        <input type="number" class="form-control" id="days" name="days"
                               required min="1" max="30" value="2">
                    </div>
                    <div class="col-md-4">
                        <label for="travelers" class="form-label fw-bold">Number of Travelers</label>
                        <input type="number" class="form-control" id="travelers" name="travelers"
                               required min="1" max="100" value="2">
                    </div>
                </div>



                <div class="row mb-5">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="outbound_transport" class="form-label fw-bold">Outbound Journey (To) 🛫</label>
                        <select class="form-select" id="outbound_transport" name="outbound_transport">
                            <option value="any">Any Mode</option>
                            <option value="flight">Flight</option>
                            <option value="train">Train</option>
                            <option value="bus">Bus</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="return_transport" class="form-label fw-bold">Return Journey (Fro) 🛬</label>
                        <select class="form-select" id="return_transport" name="return_transport">
                            <option value="any">Any Mode</option>
                            <option value="flight">Flight</option>
                            <option value="train">Train</option>
                            <option value="bus">Bus</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                        Find Destinations ✈️
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    const stateDistricts = {{ state_districts | tojson | safe if state_districts else '{}' }};
    const allLocations = {{ locations | tojson | safe if locations else '[]' }};
    
    function updateDistricts() {
        const stateSelect = document.getElementById('state_select');
        const districtsList = document.getElementById('districtsList');
        const targetStateInput = document.getElementById('target_state');
        
        const selectedState = stateSelect.value;
        
        // Clear current datalist
        districtsList.innerHTML = '';
        
        if (selectedState === 'all') {
            const option = document.createElement('option');
            option.value = 'all';
            option.textContent = 'Anywhere in the World';
            districtsList.appendChild(option);
            
            allLocations.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc;
                districtsList.appendChild(opt);
            });
            targetStateInput.value = '';
        } else {
            targetStateInput.value = selectedState; 
            
            const districts = stateDistricts[selectedState] || [];
            
            if (districts.length > 0) {
                districts.forEach(dist => {
                    const opt = document.createElement('option');
                    opt.value = dist;
                    districtsList.appendChild(opt);
                });
            } else {
                const option = document.createElement('option');
                option.value = selectedState;
                districtsList.appendChild(option);
            }
        }
    }
</script>
{% endblock %}
